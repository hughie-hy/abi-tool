<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainTool - Web3 ABI调用工具</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%2373cfd3'/><stop offset='100%25' style='stop-color:%234fb3d4'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='url(%23grad)'/><path d='M16 6 L22 12 L22 20 L16 26 L10 20 L10 12 Z' fill='white' opacity='0.9'/><circle cx='16' cy='16' r='3' fill='%2373cfd3'/></svg>">
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" onerror="this.remove()"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <img src="https://chaintool.tech/img/topLogo.0621fc14.png" alt="ChainCall" class="logo" />
            <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">
                <span id="walletBtnText">连接钱包</span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="main-grid">
            <!-- 左栏：网络配置和合约记录 -->
            <div class="left-column">
                <div class="panel config-panel">
                    <div class="panel-header">
                        <span>网络配置</span>
                    </div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>当前网络</label>
                            <div class="network-selector" id="networkDisplay">
                                <div class="network-name" id="networkName">Ethereum</div>
                                <div class="network-status" id="networkStatus">未连接钱包</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>合约地址</label>
                            <input type="text" id="contractAddress" placeholder="0x..." />
                        </div>

                        <div class="form-group">
                            <label>合约名称</label>
                            <input type="text" id="contractName" placeholder="如: USDC" />
                        </div>

                        <div class="form-group">
                            <label>ABI JSON</label>
                            <textarea id="abiInput" placeholder='粘贴合约ABI JSON...'></textarea>
                        </div>

                        <div class="btn-group" style="width: 100%; margin-bottom: 8px;">
                            <button class="btn btn-primary" onclick="loadABI()" style="flex: 1;">
                                加载
                            </button>
                        </div>

                        <div class="form-group" style="margin-top: 10px; margin-bottom: 0;">
                            <label>快捷合约</label>
                            <div class="quick-contracts">
                                <button class="quick-contract-btn" onclick="loadQuickContract('usdc')">USDC</button>
                                <button class="quick-contract-btn" onclick="loadQuickContract('usdt')">USDT</button>
                                <button class="quick-contract-btn" onclick="loadQuickContract('wbtc')">WBTC</button>
                                <button class="quick-contract-btn" onclick="loadQuickContract('uni')">UNI</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel history-panel">
                    <div class="panel-header">
                        <span>合约记录</span>
                        <button class="btn btn-sm btn-secondary" onclick="clearHistory()">清空</button>
                    </div>
                    <div class="panel-body">
                        <div id="historyList" class="saved-contracts">
                            <div class="empty-state">
                                <p>暂无合约记录</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中间：合约函数列表 -->
            <div class="panel">
                <div class="panel-header">
                    <span>合约函数</span>
                    <span class="function-count" id="functionCount"></span>
                </div>
                <div class="panel-body">
                    <div id="functionList" class="function-list">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <p>请先导入ABI数据</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：函数调用结果 -->
            <div class="panel">
                <div class="panel-header">
                    <span>调用结果</span>
                </div>
                <div class="panel-body">
                    <div id="rightContent">
                        <div class="right-placeholder">
                            <div class="empty-state">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path>
                                </svg>
                                <p>请从中间选择一个函数</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
